<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found — Philip Builds Studio</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/philip-builds/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #070d18;
        --ink: #f8fbff;
        --muted: #aab7c8;
        --line: rgba(255, 255, 255, 0.14);
        --blue: #60a5fa;
        --mint: #5eead4;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 32px;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 12%, rgba(96, 165, 250, 0.22), transparent 38%),
          radial-gradient(circle at 86% 84%, rgba(94, 234, 212, 0.16), transparent 40%),
          var(--bg);
      }
      .wrap {
        width: min(560px, 100%);
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: clamp(28px, 6vw, 52px);
        background: rgba(12, 20, 35, 0.7);
        backdrop-filter: blur(18px);
        box-shadow: 0 28px 90px rgba(2, 6, 23, 0.4);
      }
      .code {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 14px;
        border: 1px solid rgba(96, 165, 250, 0.4);
        border-radius: 999px;
        color: var(--blue);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.12em;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        line-height: 1.05;
      }
      p {
        margin: 0 auto 26px;
        max-width: 40ch;
        color: var(--muted);
        line-height: 1.6;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 10px;
        font-weight: 850;
        text-decoration: none;
      }
      a.primary {
        border: 1px solid transparent;
        background: linear-gradient(135deg, var(--blue), var(--mint));
        color: #07111f;
      }
      a.ghost {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--ink);
      }
      a.btn:focus-visible {
        outline: 3px solid rgba(94, 234, 212, 0.4);
        outline-offset: 2px;
      }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="code">404</span>
      <h1>This page took a wrong turn.</h1>
      <p>The page you were looking for doesn't exist or moved. Everything on this site is a working, fictional demo — let's get you back to one.</p>
      <div class="actions">
        <a class="btn primary" href="/philip-builds/">Back to home</a>
        <a class="btn ghost" href="/philip-builds/portfolio/">Browse the demos</a>
        <a class="btn ghost" href="/philip-builds/project-matcher/">Find your fit</a>
        <a class="btn ghost" href="/philip-builds/start-project/">Start a project</a>
        <a class="btn ghost" href="/philip-builds/studio-os/">Studio OS</a>
      </div>
    </main>
  </body>
</html>
